<div class="container mt-5">
  <div class="row">
    <div class="col-md-10 offset-md-1">
      <div class="card">
        <div class="card-body">
          <p class="alert alert-success text-center">STUDENT FORM</p>

          <form [formGroup]="UserForm" (ngSubmit)="onAddUser()">
            <div class="card mb-4">
              <div class="card-body">
                <h3 class="mb-3">Basic Information</h3>

                <div class="row">
                  <div class="col-md-6">
                    <div class="form-group mb-3">
                      <label>First Name</label>
                      <input class="form-control" formControlName="firstName" />
                    </div>
                  </div>

                  <div class="col-md-6">
                    <div class="form-group mb-3">
                      <label>Last Name</label>
                      <input class="form-control" formControlName="lastName" />
                    </div>
                  </div>
                </div>

                <div class="form-group mb-3">
                  <label>Image Url</label>
                  <input class="form-control" formControlName="imageUrl" />
                </div>

                <div class="row">
                  <div class="col-md-6">
                    <div class="form-group mb-3">
                      <label>Email</label>
                      <input class="form-control" formControlName="email" />
                    </div>
                  </div>

                  <div class="col-md-6">
                    <div class="form-group mb-3">
                      <label>Phone</label>
                      <input class="form-control" formControlName="phone" />
                    </div>
                  </div>
                </div>

                <div class="row">
                  <div class="col-md-4">
                    <div class="form-group mb-3">
                      <label>Date Of Birth</label>
                      <input
                        type="date"
                        class="form-control"
                        formControlName="dateOfBirth"
                      />
                    </div>
                  </div>

                  <div class="col-md-4">
                    <div class="form-group mb-3">
                      <label>Gender</label>
                      <select class="form-control" formControlName="gender">
                        <option value="">Select</option>
                        <option>Male</option>
                        <option>Female</option>
                      </select>
                    </div>
                  </div>

                  <div class="col-md-4">
                    <div class="form-group mb-3">
                      <label>Blood Group</label>
                      <select class="form-control" formControlName="bloodGroup">
                        <option value="">Select</option>
                        <option>A+</option>
                        <option>A-</option>
                        <option>B+</option>
                        <option>B-</option>
                        <option>AB+</option>
                        <option>AB-</option>
                        <option>O+</option>
                        <option>O-</option>
                      </select>
                    </div>
                  </div>
                </div>
              </div>
            </div>

            <div class="card mb-4">
              <div class="card-body">
                <h3 class="mb-3">Address</h3>

                <div formGroupName="address">
                  <div class="form-group mb-3">
                    <label>Street</label>
                    <input class="form-control" formControlName="street" />
                  </div>

                  <div class="row">
                    <div class="col-md-4">
                      <div class="form-group mb-3">
                        <label>City</label>
                        <input class="form-control" formControlName="city" />
                      </div>
                    </div>

                    <div class="col-md-4">
                      <div class="form-group mb-3">
                        <label>State</label>
                        <input class="form-control" formControlName="state" />
                      </div>
                    </div>

                    <div class="col-md-4">
                      <div class="form-group mb-3">
                        <label>Pincode</label>
                        <input class="form-control" formControlName="pincode" />
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </div>

            <div class="card mb-4">
              <div class="card-body">
                <div class="d-flex justify-content-between mb-3">
                  <h3>Skills</h3>
                  <button
                    *ngIf="skillsArr.length < 3; else limit"
                    [disabled]="skillsArr.invalid"
                    type="button"
                    mat-raised-button
                    color="primary"
                    (click)="onAddSkill()"
                  >
                    Add Skill
                  </button>
                </div>

                <div formArrayName="skills">
                  <div
                    class="row mb-2"
                    *ngFor="let skill of skillsArr.controls; let i = index"
                  >
                    <div class="col-md-10">
                      <input class="form-control" [formControlName]="i" />
                    </div>
                    <div class="col-md-2">
                      <button type="button" mat-raised-button color="warn">
                        Remove
                      </button>
                    </div>
                  </div>
                </div>
              </div>
            </div>

            <div class="card mb-4">
              <div class="card-body">
                <div class="d-flex justify-content-between mb-3">
                  <h3>Projects</h3>
                  <button
                    [disabled]="projectsArr.invalid"
                    *ngIf="projectsArr.length < 2; else projectlimit"
                    type="button"
                    mat-raised-button
                    color="primary"
                    (click)="onAddProject()"
                  >
                    Add Project
                  </button>
                </div>

                <div formArrayName="projects">
                  <div
                    *ngFor="let project of projectsArr.controls; let i = index"
                    [formGroupName]="i"
                    class="border rounded p-3 mb-3"
                  >
                    <div class="form-group mb-3">
                      <label>Project Title</label>
                      <input class="form-control" formControlName="title" />
                    </div>

                    <div class="form-group mb-3">
                      <label>Technology</label>
                      <input
                        class="form-control"
                        formControlName="technology"
                      />
                    </div>

                    <div class="form-group mb-3">
                      <label>Duration</label>
                      <input class="form-control" formControlName="duration" />
                    </div>

                    <button
                      type="button"
                      mat-raised-button
                      color="warn"
                      (click)="onRemoveProject(i)"
                    >
                      Remove Project
                    </button>
                  </div>
                </div>
              </div>
            </div>

            <button
              *ngIf="!isInEditMode"
              type="submit"
              mat-raised-button
              color="primary"
              class="w-100"
            >
              Add User
            </button>
            <button
              *ngIf="isInEditMode"
              type="button"
              mat-raised-button
              color="accent"
              class="w-100"
              (click)="onUpdateUser()"
            >
              Update User
            </button>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
<ng-template #limit>
  <p class="alert alert-danger">You can add only 3 skills..!</p>
</ng-template>
<ng-template #projectlimit>
  <p class="alert alert-danger">You can add only 2 Projects..!</p>
</ng-template>
