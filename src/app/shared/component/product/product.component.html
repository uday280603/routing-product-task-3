
<div class="row">
  <div class="col-12">
    <div class="card shadow">

      <img
        [src]="productObj.productImage"
        [alt]="productObj.productName"
        class="card-img-top"
        style="height:250px; object-fit:cover;"
      >

      <div class="card-body">
        <h2 class="card-title">{{ productObj.productName }}</h2>

        <ul class="list-group list-group-flush">
          <li class="list-group-item">
            <strong>Product Id:</strong> {{ productObj.productId }}
          </li>

          <li class="list-group-item">
            <strong>Description:</strong> {{ productObj.productDescription }}
          </li>

          <li class="list-group-item">
            <strong>Price:</strong> ₹ {{ productObj.productPrice }}
          </li>

          <li class="list-group-item">
            <strong>Warranty:</strong> {{ productObj.warranty }}
          </li>

          <li class="list-group-item">
            <strong>Available:</strong>
            {{ productObj.isAvailable ? 'Yes' : 'No' }}
          </li>
        </ul>

        <div class="d-flex justify-content-between mt-3">
          <button
            routerLink="edit"
            class="btn btn-primary">
            Edit
          </button>

          <button
            (click)="onRemoveProduct()"
            class="btn btn-danger">
            Delete
          </button>
        </div>
      </div>

    </div>
  </div>
</div>
